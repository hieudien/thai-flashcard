<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thai Flashcard Pro - Phiên bản Âm thanh</title>
    <script> window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); }; </script> <script defer src="/_vercel/insights/script.js"></script> 
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f0f2f5;
        }
        h2 { margin: 10px 0 15px; color: #333; }
        .card {
            width: 100%;
            max-width: 420px;
            height: 35vh;
            min-height: 200px;
            background: #fff;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .char { font-size: 80px; color: #1a73e8; }
        .detail { font-size: 20px; margin-top: 15px; display: none; text-align: center; color: #555; }
        .controls { width: 100%; max-width: 420px; margin-top: 20px; }
        button {
            width: 100%;
            padding: 15px;
            margin: 5px 0;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .row { display: flex; gap: 10px; }
        .row button { flex: 1; }
        .show { background: #1a73e8; }
        .audio { background: #9c27b0; font-size: 20px; }
        .again { background: #f44336; }
        .hard { background: #ff9800; }
        .good { background: #4CAF50; }
        .easy { background: #00c853; }
        .stats { margin-top: 15px; font-size: 14px; color: #666; }
        .reset-btn { background: #607d8b; width: auto; padding: 10px 20px; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

<h2>Học Tiếng Thái PRO</h2>

<div class="card" onclick="toggleAnswer()">
    <div class="char" id="char"></div>
    <div class="detail" id="detail"></div>
</div>

<div class="controls">
    <div class="row">
        <button class="show" onclick="toggleAnswer()">Hiện đáp án</button>
        <button class="audio" onclick="playAudio()">🔊 Phát âm</button>
    </div>
    <div class="row">
        <button class="again" onclick="rate(0)">Chưa biết</button>
        <button class="hard" onclick="rate(1)">Khó</button>
    </div>
    <div class="row">
        <button class="good" onclick="rate(2)">Nhớ</button>
        <button class="easy" onclick="rate(3)">Dễ</button>
    </div>
</div>

<div class="stats" id="stats"></div>

<button class="reset-btn" onclick="resetProgress()">
    🔄 Xóa tiến độ & Học lại từ đầu
</button>
<select id="studyMode" onchange="changeMode()">
    <option value="all">Tất cả các chữ</option>
    <option value="nguyenam">Tất cả nguyên âm</option>
    <option value="phuam">Tất cả phụ âm</option>
    <option value="phuamtrung">Phụ âm trung</option>
    <option value="phuamcao">Phụ âm cao</option>
    <option value="phuamthap1">12 Phụ âm thấp (1)</option>
    <option value="phuamthap2">12 Phụ âm thấp (2)</option>
    <option value="nguyenamngan">Nguyên âm ngắn</option>
    <option value="nguyenamdai">Nguyên âm dài</option>
    <option value="nguyenamdacbiet">Nguyên âm đặc biệt</option>
</select>

<script src="data.js"></script>
<script>
let current = null;
let show = false

const charEl = document.getElementById('char');
const detailEl = document.getElementById('detail');
const statsEl = document.getElementById('stats');
function getALLChar() {
    return baseCards.map(c => ({...c, interval:1, due:Date.now(), seen:0, correct:0}));
}
let allChar = getALLChar()
let deck = allChar
function changeMode() {    
    getNextCard()
}
function getCardByMode() {
    const studyMode = document.getElementById('studyMode').value;
    deck = allChar.filter((c, index) => {
       return studyMode == 'all' ? true : c.mode === studyMode
    })
}
function getNextCard() {
    getCardByMode()
    const now = Date.now();
    let dueCards = deck.filter(c => c.due <= now);
    if (dueCards.length === 0) {
        alert('Chúc mừng! Bạn đã hoàn thành các thẻ cần học hôm nay.');
        deck.forEach(c => c.due = now);
        dueCards = deck;
    }
    current = dueCards[Math.floor(Math.random()*dueCards.length)];
    show = false;
    render();
}

function render() {
    charEl.textContent = current.char;
    detailEl.innerHTML = `${current.detail}<br><strong>${current.charType}</strong>`;
    detailEl.style.display = show ? 'block' : 'none';
    updateStats();
}

function toggleAnswer() {
    show = !show;
    render();
}

function rate(score) {
    playAudio();
    setTimeout(() => {
        current.seen++;
        if (score >= 2) current.correct++;
    
        if (score === 0) current.interval = 1;
        else if (score === 1) current.interval *= 1.5;
        else if (score === 2) current.interval *= 2;
        else if (score === 3) current.interval *= 3;
    
        current.interval = Math.max(1, Math.round(current.interval));
        current.due = Date.now() + current.interval * 86400000;
    
        getNextCard();
    }, 1000);
}

function playAudio() {
    if (!current || !current.id) {
        console.log("Ký tự này chưa có ID âm thanh");
        const utter = new SpeechSynthesisUtterance(current.char);
        utter.lang = 'th-TH';
        speechSynthesis.speak(utter);
        return;
    }

    const base64Data = playlist.get(current.id);
    if (base64Data) {
        const audioSrc = `data:audio/mp3;base64,${base64Data}`;
        const audio = new Audio(audioSrc);
        audio.play().catch(e => console.error("Lỗi phát âm thanh:", e));
    } else {
        console.warn("Không tìm thấy âm thanh cho ID:", current.id);
    }
}

function updateStats() {    
    const total = deck.length;
    const learned = deck.filter(c => c.correct > 0).length;
    const accuracy = total === 0 ? 0 : Math.round(deck.reduce((acc,c)=>acc+(c.seen?c.correct/c.seen:0),0)/total*100);
    statsEl.innerHTML = `Tiến độ: ${learned}/${total} | Độ chính xác: ${accuracy}%`;
}


function resetProgress() {
    if (confirm("Bạn có chắc chắn muốn xóa toàn bộ tiến độ và học lại từ đầu không?")) {
        allChar = getALLChar()
        getNextCard()
        updateStats()
        alert("Đã xóa tiến độ thành công!");
    }
}

getNextCard();
</script>

</body>
</html>
